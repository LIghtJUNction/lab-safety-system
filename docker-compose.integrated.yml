# Zero-config: `docker compose -f docker-compose.integrated.yml up -d`
# No .env required. Override via environment or optional .env later.
services:
  app:
    image: ${APP_IMAGE:-docker.io/lightjunction/lab-safety-system:latest}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-lab_safety}:${POSTGRES_PASSWORD:-lab_safety_quickstart}@postgres:5432/${POSTGRES_DB:-lab_safety}
      SECRET_KEY: ${SECRET_KEY:-}
      TOKEN_TTL_SECONDS: ${TOKEN_TTL_SECONDS:-3600}
      STATIC_DIR: /app/public
      UPLOAD_DIR: /app/uploads
      SSO_ENABLED: ${SSO_ENABLED:-false}
      OAUTH_ENABLED: ${OAUTH_ENABLED:-false}
      SSO_LOGIN_URL: ${SSO_LOGIN_URL:-}
      OAUTH_LOGIN_URL: ${OAUTH_LOGIN_URL:-}
      FEDERATED_LOGIN_SECRET: ${FEDERATED_LOGIN_SECRET:-}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:${APP_PORT:-8080}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - app-config:/app/config
      - backend-uploads:/app/uploads
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/lab-safety-system", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lab_safety}
      POSTGRES_USER: ${POSTGRES_USER:-lab_safety}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_safety_quickstart}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  app-config:
  postgres-data:
  backend-uploads:
